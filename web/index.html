<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>2026 世界杯桌面实时比分</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app-container">

    <!-- 挂件主体卡片 -->
    <div id="widget-card" onmousedown="startDrag(event)">

      <!-- 顶部控制栏 -->
      <div class="control-header no-drag">
        <div class="brand">
          <span class="live-dot" id="live-indicator"></span>
          <span class="brand-text">FIFA 2026</span>
          <span class="data-status" id="data-status-text">数据加载中...</span>
        </div>
        <div class="header-actions">
          <button id="btn-close" class="action-btn" title="关闭" onclick="closeWidget()">
            <svg viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
          </button>
        </div>
      </div>

      <!-- 内容区 -->
      <div class="content-body">
        <div id="views-slider" class="slider-live">

          <!-- 视图1: 实时比分 / 无比赛提示 -->
          <div class="view-pane" id="pane-live">
            <!-- 无比赛时的提示 -->
            <div id="no-match-notice" class="no-match-notice">
              <div class="no-match-icon">⚽</div>
              <div class="no-match-title">当前并无比赛进行中</div>
              <div class="no-match-sub" id="next-match-hint">请切换到"赛程"查看后续比赛安排</div>
            </div>

            <!-- 实时比分卡片 -->
            <div id="live-match-card" class="match-score-card" style="display:none;">
              <div class="team-block home">
                <div class="flag-wrapper">
                  <img id="home-flag" class="team-flag" src="" alt="" onerror="this.src='https://flagcdn.com/w160/un.png'">
                </div>
                <div class="team-name" id="home-name"></div>
              </div>
              <div class="score-block">
                <div class="match-time-badge" id="match-status-badge">
                  <span class="live-pulse-indicator"></span>
                  <span id="match-time-text"></span>
                </div>
                <div class="score-display">
                  <span class="score-num" id="home-score-num">0</span>
                  <span class="score-divider">:</span>
                  <span class="score-num" id="away-score-num">0</span>
                </div>
                <div class="match-group-label" id="match-group-label"></div>
              </div>
              <div class="team-block away">
                <div class="flag-wrapper">
                  <img id="away-flag" class="team-flag" src="" alt="" onerror="this.src='https://flagcdn.com/w160/un.png'">
                </div>
                <div class="team-name" id="away-name"></div>
              </div>
            </div>
          </div>

          <!-- 视图2: 赛程列表 -->
          <div class="view-pane" id="pane-schedule">
            <div class="list-container" id="schedule-list"></div>
          </div>
        </div>
      </div>

      <!-- 底部导航 -->
      <div class="navigation-footer no-drag">
        <button class="nav-item active" id="nav-live" onclick="switchView('live')" title="实时比分">
          <svg viewBox="0 0 24 24"><path d="M21 3H3c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h18c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H3V5h18v14zM8 15c.55 0 1-.45 1-1v-4c0-.55-.45-1-1-1s-1 .45-1 1v4c0 .55.45 1 1 1zm8 0c.55 0 1-.45 1-1v-4c0-.55-.45-1-1-1s-1 .45-1 1v4c0 .55.45 1 1 1zm-4 0c.55 0 1-.45 1-1v-4c0-.55-.45-1-1-1s-1 .45-1 1v4c0 .55.45 1 1 1z"/></svg>
          <span>比分</span>
        </button>
        <button class="nav-item" id="nav-schedule" onclick="switchView('schedule')" title="赛程">
          <svg viewBox="0 0 24 24"><path d="M19 3h-1V1h-2v2H8V1H6v2H5c-1.11 0-1.99.9-1.99 2L3 19c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V8h14v11zM7 10h5v5H7z"/></svg>
          <span>赛程</span>
        </button>
      </div>
    </div>

    <!-- 进球通知浮层 -->
    <div id="goal-overlay" class="hidden">
      <div class="goal-announcement">
        <div class="goal-title">GOAL !!!</div>
        <div class="goal-details">
          <span id="goal-team-name"></span> 进球了！
        </div>
        <div class="goal-score" id="goal-current-score"></div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
